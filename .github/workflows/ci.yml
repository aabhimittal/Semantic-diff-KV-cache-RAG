name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
      - name: Test
        run: pytest
      - name: Divergence smoke run (tiny model)
        run: python benchmarks/divergence.py --tiny --overlaps 1.0 --ratios 0.0,1.0 --out /tmp/smoke.json
